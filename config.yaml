assistant:
  name: Axiom
  hotkey: ctrl+alt+shift+a # key combo to start recording
  personality:
    tone: casual # professional | casual | snarky
    verbosity: concise # concise | normal | verbose
  acknowledgements: true # say a short cue before slow tool work

conversation:
  follow_up_listening: true # after AXIOM asks a question, listen without another wake word
  follow_up_timeout_seconds: 120 # return to wake-word/hotkey mode after this much silence

audio:
  sample_rate: 16000 # Hz — Whisper prefers 16kHz
  max_record_seconds: 12 # hard cap per utterance
  vad_energy_threshold: 50 # lower = more sensitive; raise to ~1500 if noisy
  vad_silence_duration: 1.5 # seconds of silence before stopping
  pre_roll_seconds: 0.35 # keep audio just before VAD triggers so first words are not clipped

whisper:
  model: small # tiny | base | small | medium | large
  language: en
  temperature: 0
  condition_on_previous_text: false
  no_speech_threshold: 0.6
  logprob_threshold: -1
  initial_prompt: "AXIOM personal voice assistant. Common words: Gmail, Spotify, Calendar,
    Obsidian, Claude, Gemini, AXIOM, Jarvis."

tts:
  engine: edge # edge (online, better quality) | pyttsx3 (fast/offline fallback)
  edge_voice: en-US-AndrewNeural # deep male; alternatives: BrianNeural, GuyNeural, ChristopherNeural, RyanNeural (UK)
  edge_rate: "+12%"
  max_chunk_chars: 140
  sentence_streaming: true # speak sentence chunks so responses begin sooner
  gemini_streaming: true # stream normal Gemini replies into TTS before full answer completes
  interruptible: true # hotkey or wake word can stop playback and listen again
  pyttsx3_rate: 175
  pyttsx3_volume: 0.9

gemini:
  model: gemini-2.5-flash # free tier — also works: gemini-flash-latest
  max_tokens: 400 # keep low — responses are spoken aloud

memory:
  file: memory.json
  max_history: 50 # message pairs kept across sessions
  auto_summarize_after: 20 # summarize older turns after this many user turns

server:
  host: 127.0.0.1
  port: 5000
  open_browser: true # auto-open UI on startup

wake_word:
  enabled: true # listens continuously alongside the configured hotkey
  model: hey_jarvis # closest built-in model to "Hey Axiom"; for true "Hey Axiom" train at github.com/dscripka/openWakeWord
  model_path: "" # custom .onnx path overrides model
  threshold: 1   # raise if false positives happen
  cooldown_seconds: 3 # minimum seconds between activations
  download_retries: 3 # model download attempts before falling back to hotkey only

# Phase 2: First-class projects with rich metadata.
# Voice resolves names + aliases via fuzzy matching (rapidfuzz, threshold 80).
# Backwards compat: any repos: entries below that aren't redeclared here are
# auto-promoted to minimal project entries by ProjectRegistry.
projects:
  axiom:
    name: "AXIOM"
    aliases:
    - axiom voice assistant
    - voice assistant
    - the assistant
    repo_path: "E:/_DEV/Personal Voice Assistant"
    description: "Local Windows voice assistant"
    default_scenario: coding_sequence
    obsidian_folder: "Projects/AXIOM"
    websites:
    - github
    - claude
    tags:
    - voice
    - ai
    - python
  labforge:
    name: "LabForge"
    aliases:
    - labforge
    - latex formatter
    - ai formatter
    - formatter app
    repo_path: "E:/_DEV/LabForge"
    description: "A website that formats reports and papers from messy text into clean
      LaTeX"
    default_scenario: coding_sequence
    obsidian_folder: "Projects/LabForge"
    websites:
    - github
    - claude
    tags:
    - formatting
    - latex
    - javascript
    - nodejs
    - react
repos:
  axiom: "E:/_DEV/Personal Voice Assistant"
  # add more, e.g.:
  # myproject: "C:/path/to/myproject"

# Map shortcut names to URLs — used by the open_website tool.
# Say "open my email" or "open github" and AXIOM launches the URL.
websites:
  github: "https://github.com"
  email: "https://mail.google.com"
  calendar: "https://calendar.google.com"
  youtube: "https://youtube.com"
  chatgpt: "https://chat.openai.com"
  claude: "https://claude.ai"

# Map shortcut names to URLs — used by the open_website tool.
# Say "open my email" or "open github" and AXIOM launches the URL.
# Obsidian vault integration
obsidian:
  vault_path: "E:/_DEV/Personal Voice Assistant" # REQUIRED: e.g. C:/Users/hmgad/Documents/ObsidianVault
  daily_notes_folder: "" # Optional subfolder for daily notes (e.g. "Daily Notes")
  tasks_scan_paths: []
  task_sources: []
  inbox_note: "AXIOM Inbox.md"
  task_archive_note: "AXIOM Done.md"
  default_project: "AXIOM"
  courses_folder: "Courses"
  projects_folder: "Projects"
  objectives_folder: "Objectives"

google:
  enable_calendar: true # Set true after adding secrets/google_oauth_client.json
  oauth_credentials_file: "secrets/google_oauth_client.json"
  token_file: "secrets/google_token.json"
  oauth_timeout_seconds: 180
  calendar_id: "primary"
  timezone: "Europe/Berlin"

spotify:
  enabled: true
  client_id: "c7893b0bb9af4beeb5e4d8bb9c69459a"
  client_secret: "" # Prefer SPOTIPY_CLIENT_SECRET in .env
  redirect_uri: "http://127.0.0.1:8888/callback"
  cache_path: "secrets/spotify_token.json"

gmail:
  enabled: true
  scopes:
  - https://www.googleapis.com/auth/gmail.readonly
  state_file: "secrets/last_email_check.json"
  use_gemini_summary: false
  max_results: 20

home_assistant:
  enabled: false
  url: "" # e.g. http://homeassistant.local:8123
  token: "" # Prefer HOME_ASSISTANT_TOKEN in .env for real use

scenarios:
  # Existing simple scenarios — migrated to new step format
  ai_tools:
    description: "Open Claude.ai and ChatGPT side by side"
    steps:
    - action: open_website
      target: chatgpt
    - action: open_website
      target: claude
  correspondence:
    description: "Open email and calendar"
    steps:
    - action: open_website
      target: email
    - action: open_website
      target: calendar
  coding_sequence:
    description: "Start a coding session for a project"
    requires_project: true
    steps:
    - action: speak
      text: Starting coding sequence for {project_name}.
    - action: open_repo
      repo: '{project_name}'
    - action: wait
      seconds: 1
    - action: open_website
      target: claude
    - action: open_website
      target: chatgpt
    - action: open_website
      target: github
    - action: run_git
      command: status --short
      repo: '{project_name}'
    - action: speak
      text: '{project_name} is ready. What are we tackling today?'
  morning_routine:
    description: "Daily startup workflow — weather, schedule, project status, last commit"
    steps:
    - action: speak
      text: Good morning. Today is {day}, {date}.
    - action: tool
      inputs:
        location: Eindhoven
      name: get_weather
    - action: tool
      name: today_schedule
      inputs: {}
    - action: tool
      name: project_status
      inputs:
        project_name: axiom
    - action: tool
      name: get_last_commit_message
      inputs:
        repo_name: axiom
    - action: open_website
      target: email
    - action: open_website
      target: calendar
    - action: tool
      inputs:
        content: Started the day at {time}.
      name: append_daily_note
  deep_work:
    description: "Enter focus mode — lo-fi music, 90-minute timer"
    steps:
    - action: tool
      inputs:
        level: 30
      name: set_volume
    - action: open_website
      target: https://www.youtube.com/watch?v=jfKfPfyJRdk
    - action: notify
      message: Deep work mode active. 90 minute timer set.
      title: AXIOM
    - action: tool
      inputs:
        label: Deep Work
        minutes: 90
      name: set_timer
    - action: speak
      text: Deep work mode. Ninety minutes. Go.
  wrap_up:
    description: "End of day shutdown"
    steps:
    - action: ask
      prompt: What did you accomplish today?
      slot: accomplishments
    - action: tool
      inputs:
        content: 'End of day: {accomplishments}'
      name: append_daily_note
    - action: run_git
      command: status
    - action: speak
      text: Logged. See you tomorrow.
learning:
  reflection_enabled: true
  auto_reflect_after_sessions: 10   # trigger reflection every N sessions
  reflection_window_days: 7         # how many days of logs to read per reflection
  session_logs_dir: data/session_logs
  user_model_file: data/user_model.json
  suggestions_file: data/suggestions.json

brain:
  enabled: true
  vault_subfolder: "AXIOM Brain"         # relative to obsidian.vault_path
  recall_on_every_request: true          # inject context before each response
  crystallise_threshold_seconds: 20      # crystallise if interaction took this long
  max_recall_tokens: 400
  max_episodes: 500                      # prune oldest if exceeded
